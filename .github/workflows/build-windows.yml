name: Build TiHiY MultiStream Pro OBS Plugin

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-windows:
    name: Windows build test
    runs-on: windows-2022

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup MSVC developer command prompt
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install Qt 6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.3'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2022_64'

      - name: Show repository files
        shell: pwsh
        run: |
          Write-Host "Repository root:"
          Get-ChildItem
          Write-Host "Recursive file list:"
          Get-ChildItem -Recurse | Select-Object FullName

      - name: Check Visual Studio / MSVC / Qt
        shell: pwsh
        run: |
          Write-Host "Checking Visual Studio..."
          & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          Write-Host "Checking compiler..."
          cl
          Write-Host "Checking Qt..."
          Write-Host "Qt6_DIR=$env:Qt6_DIR"
          Write-Host "QT_ROOT_DIR=$env:QT_ROOT_DIR"
          qmake --version

      - name: Validate required project files
        shell: pwsh
        run: |
          $required = @(
            "CMakeLists.txt",
            "src",
            "data",
            "installer"
          )

          foreach ($item in $required) {
            if (!(Test-Path $item)) {
              throw "Missing required file or folder: $item"
            }
          }

          Write-Host "Basic project structure OK."

      - name: Configure CMake
        shell: pwsh
        run: |
          cmake -S . -B build -G "NMake Makefiles" -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="$env:Qt6_DIR;$env:QT_ROOT_DIR"

      - name: Build Release
        shell: pwsh
        run: |
          cmake --build build --config Release --verbose

      - name: Collect build artifacts
        if: always()
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifact

          if (Test-Path "build") {
            Copy-Item -Recurse "build" "artifact/build"
          }

          if (Test-Path "data") {
            Copy-Item -Recurse "data" "artifact/data"
          }

          if (Test-Path "installer") {
            Copy-Item -Recurse "installer" "artifact/installer"
          }

          Copy-Item "CMakeLists.txt" "artifact/" -ErrorAction SilentlyContinue
          Copy-Item "README_UA.md" "artifact/" -ErrorAction SilentlyContinue
          Copy-Item "LICENSE.txt" "artifact/" -ErrorAction SilentlyContinue

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: TiHiY-MultiStream-Pro-Windows-Build
          path: artifact
